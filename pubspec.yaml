name: sushi_galaxy
description: "Sushi Galaxy - A delicious match-3 puzzle game in space!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  shared_preferences: ^2.2.3

  # UI & Animations
  flutter_animate: ^4.5.0

  # Utils
  uuid: ^4.4.2
  collection: ^1.18.0
  equatable: ^2.0.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/animations/