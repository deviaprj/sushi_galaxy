<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cucuGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80D8FF"/>
      <stop offset="50%" stop-color="#00B0FF"/>
      <stop offset="100%" stop-color="#0081CB"/>
    </linearGradient>
    <radialGradient id="cucuSeed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E1F5FE"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rice base -->
  <ellipse cx="32" cy="44" rx="20" ry="10" fill="#FFFFF0" filter="url(#glow)"/>
  <!-- Cucumber cross-section (circle) -->
  <circle cx="32" cy="28" r="18" fill="url(#cucuGrad)"/>
  <!-- Inner flesh ring -->
  <circle cx="32" cy="28" r="14" fill="#E1F5FE" opacity="0.7"/>
  <!-- Seed pockets (star pattern) -->
  <ellipse cx="32" cy="18" rx="2.5" ry="3.5" fill="url(#cucuSeed)" opacity="0.9"/>
  <ellipse cx="32" cy="38" rx="2.5" ry="3.5" fill="url(#cucuSeed)" opacity="0.9"/>
  <ellipse cx="22" cy="23" rx="3.5" ry="2.5" fill="url(#cucuSeed)" opacity="0.9"/>
  <ellipse cx="42" cy="23" rx="3.5" ry="2.5" fill="url(#cucuSeed)" opacity="0.9"/>
  <ellipse cx="22" cy="33" rx="3.5" ry="2.5" fill="url(#cucuSeed)" opacity="0.9"/>
  <ellipse cx="42" cy="33" rx="3.5" ry="2.5" fill="url(#cucuSeed)" opacity="0.9"/>
  <!-- Center -->
  <circle cx="32" cy="28" r="4" fill="#B3E5FC" opacity="0.8"/>
  <!-- Outer ring border -->
  <circle cx="32" cy="28" r="18" fill="none" stroke="#0081CB" stroke-width="2"/>
  <!-- Gloss arc -->
  <path d="M18 22 Q26 16 38 20" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.45" stroke-linecap="round"/>
</svg>