<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="dropShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feOffset dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#1B3A1B" flood-opacity="0.35"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neumorphic" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dx="-1" dy="-1" result="lightOffset"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.4"/>
      <feComposite in2="lightOffset" operator="in" result="highlight"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="darkBlur"/>
      <feOffset dx="1.5" dy="1.5" result="darkOffset"/>
      <feFlood flood-color="#000000" flood-opacity="0.2"/>
      <feComposite in2="darkOffset" operator="in" result="innerShadow"/>
      <feMerge>
        <feMergeNode in="highlight"/>
        <feMergeNode in="innerShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Nori (seaweed) gradient -->
    <linearGradient id="noriGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="50%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#0D3B0D"/>
    </linearGradient>
    <!-- Rice gradient -->
    <radialGradient id="riceGrad" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#E8DCC8"/>
    </radialGradient>
    <!-- Cucumber filling gradient -->
    <linearGradient id="cucumberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="30%" stop-color="#A5D6A7"/>
      <stop offset="70%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <!-- Cucumber skin ring -->
    <linearGradient id="cucumberSkin" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="50%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <!-- Rice specular -->
    <radialGradient id="riceSpecular" cx="0.42" cy="0.35" r="0.45">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Glossy highlight -->
    <radialGradient id="glossMaki" cx="0.42" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Cucumber seed pattern -->
    <radialGradient id="seedGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E8F5E9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#A5D6A7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Nori (seaweed) outer ring -->
    <circle cx="32" cy="32" r="26" fill="url(#noriGrad)" filter="url(#neumorphic)"/>
    <!-- Nori texture - subtle line -->
    <circle cx="32" cy="32" r="25" fill="none" stroke="#1B5E20" stroke-width="0.5" opacity="0.3"/>

    <!-- Rice middle layer -->
    <circle cx="32" cy="32" r="21" fill="url(#riceGrad)"/>
    <!-- Rice specular -->
    <circle cx="32" cy="32" r="21" fill="url(#riceSpecular)"/>
    <!-- Rice grain texture -->
    <circle cx="22" cy="26" r="1" fill="#E0D5C5" opacity="0.4"/>
    <circle cx="30" cy="22" r="0.9" fill="#E0D5C5" opacity="0.35"/>
    <circle cx="38" cy="24" r="1" fill="#E0D5C5" opacity="0.4"/>
    <circle cx="20" cy="34" r="0.9" fill="#E0D5C5" opacity="0.35"/>
    <circle cx="28" cy="36" r="1" fill="#E0D5C5" opacity="0.4"/>
    <circle cx="36" cy="34" r="0.8" fill="#E0D5C5" opacity="0.3"/>
    <circle cx="42" cy="32" r="1" fill="#E0D5C5" opacity="0.4"/>
    <circle cx="34" cy="42" r="0.9" fill="#E0D5C5" opacity="0.35"/>
    <circle cx="26" cy="44" r="1" fill="#E0D5C5" opacity="0.4"/>
    <circle cx="40" cy="40" r="0.8" fill="#E0D5C5" opacity="0.3"/>

    <!-- Cucumber skin ring (outer edge of filling) -->
    <circle cx="32" cy="32" r="14" fill="url(#cucumberSkin)"/>

    <!-- Cucumber inner filling -->
    <circle cx="32" cy="32" r="12" fill="url(#cucumberGrad)"/>

    <!-- Cucumber seeds pattern (radiating from center) -->
    <ellipse cx="32" cy="24" rx="1.5" ry="3.5" fill="url(#seedGrad)" opacity="0.6"/>
    <ellipse cx="38.5" cy="28" rx="1.5" ry="3.5" fill="url(#seedGrad)" opacity="0.55" transform="rotate(60 38.5 28)"/>
    <ellipse cx="38.5" cy="36" rx="1.5" ry="3.5" fill="url(#seedGrad)" opacity="0.55" transform="rotate(120 38.5 36)"/>
    <ellipse cx="32" cy="40" rx="1.5" ry="3.5" fill="url(#seedGrad)" opacity="0.5" transform="rotate(180 32 40)"/>
    <ellipse cx="25.5" cy="36" rx="1.5" ry="3.5" fill="url(#seedGrad)" opacity="0.55" transform="rotate(240 25.5 36)"/>
    <ellipse cx="25.5" cy="28" rx="1.5" ry="3.5" fill="url(#seedGrad)" opacity="0.55" transform="rotate(300 25.5 28)"/>

    <!-- Center dot -->
    <circle cx="32" cy="32" r="2.5" fill="#E8F5E9" opacity="0.6"/>
    <circle cx="32" cy="32" r="1.2" fill="#F1F8E9" opacity="0.4"/>

    <!-- Glass-like specular highlight (arc) -->
    <path d="M18 20 Q22 14 32 14 Q38 14 42 18 Q36 16 28 16 Q22 17 18 20Z" fill="url(#glossMaki)"/>
    <!-- Specular dots -->
    <ellipse cx="24" cy="20" rx="3.5" ry="2" fill="#ffffff" opacity="0.35"/>
    <ellipse cx="24" cy="20" rx="2" ry="1" fill="#ffffff" opacity="0.18"/>

    <!-- Outer ring shadow line -->
    <circle cx="32" cy="32" r="25.5" fill="none" stroke="#0D3B0D" stroke-width="0.6" opacity="0.2"/>
  </g>
</svg>