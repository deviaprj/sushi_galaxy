<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="dropShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feOffset dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#3E2723" flood-opacity="0.4"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neumorphic" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dx="-1" dy="-1" result="lightOffset"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.35"/>
      <feComposite in2="lightOffset" operator="in" result="highlight"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="darkBlur"/>
      <feOffset dx="1.5" dy="1.5" result="darkOffset"/>
      <feFlood flood-color="#000000" flood-opacity="0.22"/>
      <feComposite in2="darkOffset" operator="in" result="innerShadow"/>
      <feMerge>
        <feMergeNode in="highlight"/>
        <feMergeNode in="innerShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Sausage body gradient -->
    <linearGradient id="sausageGrad" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#A1887F"/>
      <stop offset="25%" stop-color="#8D6E63"/>
      <stop offset="60%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <!-- Sausage highlight gradient -->
    <linearGradient id="sausageHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BCAAA4" stop-opacity="0.6"/>
      <stop offset="35%" stop-color="#A1887F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8D6E63" stop-opacity="0"/>
    </linearGradient>
    <!-- Rice gradient -->
    <linearGradient id="riceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#E8DCC8"/>
    </linearGradient>
    <!-- Glossy highlight -->
    <linearGradient id="glossSausage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Radial glow -->
    <radialGradient id="sausageGlow" cx="0.4" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#BCAAA4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8D6E63" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6D4C41" stop-opacity="0"/>
    </radialGradient>
    <!-- Rice specular -->
    <radialGradient id="riceSpecular" cx="0.45" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- End cap gradient -->
    <radialGradient id="endCapGrad" cx="0.45" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#A1887F"/>
      <stop offset="60%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </radialGradient>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Sausage cylindrical body -->
    <rect x="10" y="20" width="44" height="22" rx="11" ry="11" fill="url(#sausageGrad)" filter="url(#neumorphic)"/>
    <!-- Radial glow overlay -->
    <rect x="10" y="20" width="44" height="22" rx="11" ry="11" fill="url(#sausageGlow)"/>
    <!-- Highlight gradient overlay -->
    <rect x="10" y="20" width="44" height="22" rx="11" ry="11" fill="url(#sausageHighlight)"/>

    <!-- Sausage casewrinkle lines -->
    <path d="M20 24 Q24 22 28 24" stroke="#5D4037" stroke-width="0.6" fill="none" opacity="0.25"/>
    <path d="M32 22 Q36 20 40 22" stroke="#5D4037" stroke-width="0.5" fill="none" opacity="0.2"/>
    <path d="M26 38 Q30 40 34 38" stroke="#5D4037" stroke-width="0.5" fill="none" opacity="0.2"/>
    <path d="M38 36 Q42 38 46 36" stroke="#5D4037" stroke-width="0.5" fill="none" opacity="0.18"/>
    <path d="M16 30 Q18 28 20 30" stroke="#5D4037" stroke-width="0.4" fill="none" opacity="0.15"/>
    <path d="M44 32 Q46 30 48 32" stroke="#5D4037" stroke-width="0.4" fill="none" opacity="0.15"/>

    <!-- Sausage end cap (left) -->
    <ellipse cx="14" cy="31" rx="4" ry="11" fill="url(#endCapGrad)" opacity="0.6"/>
    <!-- Sausage end cap (right) -->
    <ellipse cx="50" cy="31" rx="4" ry="11" fill="url(#endCapGrad)" opacity="0.6"/>

    <!-- Sausage cross-hatch marks (grill marks) -->
    <path d="M18 28 L22 34" stroke="#4E342E" stroke-width="0.7" fill="none" opacity="0.15"/>
    <path d="M24 26 L28 32" stroke="#4E342E" stroke-width="0.7" fill="none" opacity="0.15"/>
    <path d="M30 28 L34 34" stroke="#4E342E" stroke-width="0.7" fill="none" opacity="0.15"/>
    <path d="M36 26 L40 32" stroke="#4E342E" stroke-width="0.7" fill="none" opacity="0.15"/>
    <path d="M42 28 L46 34" stroke="#4E342E" stroke-width="0.7" fill="none" opacity="0.15"/>

    <!-- Glossy highlight band -->
    <rect x="12" y="21" width="40" height="9" rx="8" ry="5" fill="url(#glossSausage)"/>

    <!-- Glass-like specular highlights -->
    <ellipse cx="24" cy="25" rx="6" ry="3" fill="#ffffff" opacity="0.38"/>
    <ellipse cx="24" cy="25" rx="3.5" ry="1.5" fill="#ffffff" opacity="0.18"/>

    <!-- Rice base -->
    <rect x="8" y="42" width="48" height="14" rx="5" ry="5" fill="url(#riceGrad)" filter="url(#neumorphic)"/>
    <rect x="8" y="42" width="48" height="7" rx="5" ry="4" fill="url(#riceSpecular)"/>
    <!-- Rice texture dots -->
    <circle cx="18" cy="49" r="1" fill="#E0D5C5" opacity="0.5"/>
    <circle cx="28" cy="47" r="0.9" fill="#E0D5C5" opacity="0.4"/>
    <circle cx="38" cy="50" r="1" fill="#E0D5C5" opacity="0.45"/>
    <circle cx="45" cy="48" r="1" fill="#E0D5C5" opacity="0.5"/>
    <circle cx="23" cy="51" r="0.8" fill="#E0D5C5" opacity="0.35"/>
    <circle cx="33" cy="49" r="0.9" fill="#E0D5C5" opacity="0.4"/>

    <!-- Bottom edge shadow where sausage meets rice -->
    <line x1="14" y1="42" x2="50" y2="42" stroke="#4E342E" stroke-width="0.6" opacity="0.12"/>
  </g>
</svg>