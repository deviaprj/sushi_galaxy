<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="sausGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B388FF"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
    <radialGradient id="meatGrad" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Nori outer ring (dark) -->
  <circle cx="32" cy="30" r="22" fill="#212121"/>
  <!-- Rice ring -->
  <circle cx="32" cy="30" r="18" fill="#FAFAFA"/>
  <!-- Violet sausage center -->
  <circle cx="32" cy="30" r="12" fill="url(#meatGrad)"/>
  <!-- Filling texture swirls -->
  <path d="M26 25 Q32 20 38 25 Q43 30 38 35 Q32 40 26 35 Q21 30 26 25 Z" 
        fill="url(#sausGrad)" opacity="0.8"/>
  <!-- Meat pattern lines -->
  <path d="M26 28 Q32 24 38 28" fill="none" stroke="#EDE7F6" stroke-width="1.5" opacity="0.6"/>
  <path d="M26 32 Q32 36 38 32" fill="none" stroke="#EDE7F6" stroke-width="1.5" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="32" cy="30" r="3" fill="#EDE7F6" opacity="0.7"/>
  <!-- Nori outer border -->
  <circle cx="32" cy="30" r="22" fill="none" stroke="#1B5E20" stroke-width="2.5"/>
  <!-- Top gloss -->
  <path d="M18 22 Q26 16 42 22" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
</svg>