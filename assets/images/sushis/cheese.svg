<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="dropShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feOffset dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#5D4037" flood-opacity="0.3"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neumorphic" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dx="-1" dy="-1" result="lightOffset"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.4"/>
      <feComposite in2="lightOffset" operator="in" result="highlight"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="darkBlur"/>
      <feOffset dx="1.5" dy="1.5" result="darkOffset"/>
      <feFlood flood-color="#000000" flood-opacity="0.18"/>
      <feComposite in2="darkOffset" operator="in" result="innerShadow"/>
      <feMerge>
        <feMergeNode in="highlight"/>
        <feMergeNode in="innerShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Cheese face gradient -->
    <linearGradient id="cheeseGrad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="25%" stop-color="#FFEE58"/>
      <stop offset="60%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <!-- Cheese side gradient (darker) -->
    <linearGradient id="cheeseSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F57F17"/>
    </linearGradient>
    <!-- Hole gradient -->
    <radialGradient id="holeGrad" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#F9A825" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E65100" stop-opacity="0.2"/>
    </radialGradient>
    <!-- Glossy highlight -->
    <linearGradient id="glossCheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Radial glow -->
    <radialGradient id="cheeseGlow" cx="0.4" cy="0.25" r="0.65">
      <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#FFEE58" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FDD835" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Cheese wedge - front face -->
    <path d="M10 18 L54 18 L54 50 Q32 58 10 50Z" fill="url(#cheeseGrad)" filter="url(#neumorphic)"/>
    <!-- Radial glow overlay -->
    <path d="M10 18 L54 18 L54 50 Q32 58 10 50Z" fill="url(#cheeseGlow)"/>

    <!-- Cheese wedge - side face (right edge, 3D effect) -->
    <path d="M54 18 L58 22 L58 48 Q40 56 54 50Z" fill="url(#cheeseSide)" opacity="0.75"/>
    <!-- Side face highlight -->
    <path d="M54 18 L58 22 L58 30 L54 28Z" fill="#ffffff" opacity="0.15"/>

    <!-- Top face (3D perspective) -->
    <path d="M10 18 L14 14 L58 14 L54 18Z" fill="#FFF9C4" opacity="0.85"/>
    <!-- Top face gradient -->
    <path d="M10 18 L14 14 L58 14 L54 18Z" fill="url(#glossCheese)" opacity="0.6"/>

    <!-- Cheese holes (on front face) -->
    <ellipse cx="25" cy="30" rx="4" ry="3.5" fill="url(#holeGrad)" opacity="0.7"/>
    <ellipse cx="25" cy="30" rx="3" ry="2.5" fill="#F9A825" opacity="0.4"/>
    <!-- Hole inner shadow -->
    <ellipse cx="24" cy="29" rx="2" ry="1.5" fill="#ffffff" opacity="0.12"/>

    <ellipse cx="42" cy="28" rx="3" ry="2.5" fill="url(#holeGrad)" opacity="0.65"/>
    <ellipse cx="42" cy="28" rx="2" ry="1.8" fill="#F9A825" opacity="0.35"/>
    <ellipse cx="41.5" cy="27.5" rx="1.2" ry="1" fill="#ffffff" opacity="0.1"/>

    <ellipse cx="35" cy="42" rx="3.5" ry="3" fill="url(#holeGrad)" opacity="0.6"/>
    <ellipse cx="35" cy="42" rx="2.5" ry="2" fill="#F9A825" opacity="0.35"/>
    <ellipse cx="34" cy="41" rx="1.5" ry="1.2" fill="#ffffff" opacity="0.1"/>

    <ellipse cx="18" cy="44" rx="2.5" ry="2" fill="url(#holeGrad)" opacity="0.5"/>
    <ellipse cx="18" cy="44" rx="1.8" ry="1.3" fill="#F9A825" opacity="0.3"/>

    <ellipse cx="48" cy="40" rx="2" ry="1.8" fill="url(#holeGrad)" opacity="0.45"/>
    <ellipse cx="48" cy="40" rx="1.3" ry="1.1" fill="#F9A825" opacity="0.25"/>

    <!-- Hole on top face -->
    <ellipse cx="30" cy="16" rx="2.5" ry="1.5" fill="#F9A825" opacity="0.4"/>
    <ellipse cx="44" cy="15.5" rx="1.8" ry="1" fill="#F9A825" opacity="0.35"/>

    <!-- Hole on side face -->
    <ellipse cx="56" cy="32" rx="1.5" ry="2.5" fill="#E65100" opacity="0.3"/>

    <!-- Glossy highlight on front face -->
    <path d="M14 20 Q32 18 52 20 L52 30 Q32 28 14 30Z" fill="url(#glossCheese)"/>

    <!-- Specular highlights -->
    <ellipse cx="24" cy="22" rx="5" ry="2.5" fill="#ffffff" opacity="0.38"/>
    <ellipse cx="24" cy="22" rx="3" ry="1.3" fill="#ffffff" opacity="0.18"/>

    <!-- Front face edge highlight -->
    <path d="M10 18 L54 18" stroke="#FFF9C4" stroke-width="0.8" opacity="0.4"/>

    <!-- Bottom shadow line -->
    <path d="M10 50 Q32 58 54 50" stroke="#E65100" stroke-width="0.6" fill="none" opacity="0.15"/>
  </g>
</svg>