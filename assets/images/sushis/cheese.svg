<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="cheeseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCC80"/>
      <stop offset="50%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rice base -->
  <ellipse cx="32" cy="45" rx="20" ry="10" fill="#FFFFF0" filter="url(#glow)"/>
  <!-- Cheese wedge shape -->
  <path d="M8 42 L8 24 Q8 16 16 14 L48 14 Q56 14 56 24 L56 42 Z" fill="url(#cheeseGrad)" rx="4"/>
  <!-- Cheese holes -->
  <ellipse cx="20" cy="24" rx="4" ry="3.5" fill="#E65100" opacity="0.5"/>
  <ellipse cx="38" cy="28" rx="5" ry="4" fill="#E65100" opacity="0.5"/>
  <ellipse cx="26" cy="35" rx="3.5" ry="3" fill="#E65100" opacity="0.5"/>
  <ellipse cx="46" cy="20" rx="3" ry="2.5" fill="#E65100" opacity="0.4"/>
  <!-- Melty drips at bottom -->
  <path d="M14 42 Q15 48 16 42" fill="#FFAB40" opacity="0.7"/>
  <path d="M26 42 Q27 49 28 42" fill="#FFAB40" opacity="0.7"/>
  <path d="M40 42 Q41 48 42 42" fill="#FFAB40" opacity="0.7"/>
  <!-- Gloss highlight -->
  <path d="M10 18 Q28 12 54 18" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  <!-- Triangle point decoration -->
  <path d="M32 10 L40 14 L24 14 Z" fill="#FF8F00" opacity="0.8"/>
</svg>