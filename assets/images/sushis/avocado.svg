<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="avoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="50%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#00701A"/>
    </linearGradient>
    <radialGradient id="avoPit" cx="0.5" cy="0.55" r="0.4">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rice base -->
  <ellipse cx="32" cy="44" rx="20" ry="10" fill="#FFFFF0" filter="url(#glow)"/>
  <!-- Avocado slice (pear shape) -->
  <path d="M32 14 C22 14 16 22 16 32 C16 40 22 46 32 46 C42 46 48 40 48 32 C48 22 42 14 32 14 Z" 
        fill="url(#avoGrad)"/>
  <!-- Inner flesh (lighter) -->
  <path d="M32 18 C24 18 20 24 20 32 C20 38 24 43 32 43 C40 43 44 38 44 32 C44 24 40 18 32 18 Z" 
        fill="#B9F6CA" opacity="0.8"/>
  <!-- Pit (brown center) -->
  <ellipse cx="32" cy="33" rx="7" ry="8" fill="url(#avoPit)"/>
  <!-- Pit sheen -->
  <ellipse cx="29" cy="30" rx="2.5" ry="2" fill="#8D6E63" opacity="0.6"/>
  <!-- Outer skin border -->
  <path d="M32 14 C22 14 16 22 16 32 C16 40 22 46 32 46 C42 46 48 40 48 32 C48 22 42 14 32 14 Z" 
        fill="none" stroke="#00701A" stroke-width="2"/>
  <!-- Top shine -->
  <ellipse cx="28" cy="19" rx="5" ry="2.5" fill="#FFFFFF" opacity="0.35"/>
</svg>