<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="dropShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="blur"/>
      <feOffset dx="1" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#1B3A1B" flood-opacity="0.35"/>
      <feComposite in2="offsetBlur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neumorphic" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dx="-1" dy="-1" result="lightOffset"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.4"/>
      <feComposite in2="lightOffset" operator="in" result="highlight"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="darkBlur"/>
      <feOffset dx="1.5" dy="1.5" result="darkOffset"/>
      <feFlood flood-color="#000000" flood-opacity="0.2"/>
      <feComposite in2="darkOffset" operator="in" result="innerShadow"/>
      <feMerge>
        <feMergeNode in="highlight"/>
        <feMergeNode in="innerShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Avocado skin gradient -->
    <linearGradient id="avocadoGrad" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="30%" stop-color="#66BB6A"/>
      <stop offset="70%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <!-- Avocado inner flesh -->
    <linearGradient id="fleshGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="30%" stop-color="#DCEDC8"/>
      <stop offset="70%" stop-color="#C5E1A5"/>
      <stop offset="100%" stop-color="#AED581"/>
    </linearGradient>
    <!-- Seed gradient -->
    <radialGradient id="seedGrad" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="50%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </radialGradient>
    <!-- Seed highlight -->
    <linearGradient id="seedGloss" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Glossy highlight -->
    <linearGradient id="glossAvocado" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Radial glow -->
    <radialGradient id="avocadoGlow" cx="0.42" cy="0.28" r="0.6">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#66BB6A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#388E3C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g filter="url(#dropShadow)">
    <!-- Avocado outer pear shape -->
    <path d="M32 6 Q48 6 52 22 Q56 38 48 48 Q40 58 32 58 Q24 58 16 48 Q8 38 12 22 Q16 6 32 6Z" fill="url(#avocadoGrad)" filter="url(#neumorphic)"/>
    <!-- Radial glow -->
    <path d="M32 6 Q48 6 52 22 Q56 38 48 48 Q40 58 32 58 Q24 58 16 48 Q8 38 12 22 Q16 6 32 6Z" fill="url(#avocadoGlow)"/>

    <!-- Avocado inner flesh (lighter area) -->
    <path d="M32 12 Q44 12 47 24 Q50 36 44 44 Q38 52 32 52 Q26 52 20 44 Q14 36 17 24 Q20 12 32 12Z" fill="url(#fleshGrad)" opacity="0.85"/>

    <!-- Flesh texture lines -->
    <path d="M22 20 Q27 18 32 20" stroke="#AED581" stroke-width="0.4" fill="none" opacity="0.4"/>
    <path d="M36 18 Q40 20 42 24" stroke="#AED581" stroke-width="0.4" fill="none" opacity="0.35"/>
    <path d="M20 36 Q24 38 28 36" stroke="#C5E1A5" stroke-width="0.3" fill="none" opacity="0.3"/>

    <!-- Seed -->
    <ellipse cx="32" cy="34" rx="8" ry="9" fill="url(#seedGrad)"/>
    <!-- Seed gloss -->
    <ellipse cx="32" cy="34" rx="8" ry="9" fill="url(#seedGloss)"/>
    <!-- Seed specular highlight -->
    <ellipse cx="29" cy="30" rx="3" ry="2.5" fill="#ffffff" opacity="0.3"/>
    <ellipse cx="29" cy="30" rx="1.8" ry="1.3" fill="#ffffff" opacity="0.15"/>

    <!-- Glossy highlight on avocado body -->
    <path d="M20 14 Q28 10 38 12 Q44 14 46 20 Q38 16 28 15 Q22 15 20 14Z" fill="url(#glossAvocado)"/>

    <!-- Main specular highlight -->
    <ellipse cx="24" cy="16" rx="5" ry="2.5" fill="#ffffff" opacity="0.35"/>
    <ellipse cx="24" cy="16" rx="3" ry="1.2" fill="#ffffff" opacity="0.18"/>

    <!-- Bottom shadow accent -->
    <path d="M22 52 Q32 58 42 52" stroke="#1B5E20" stroke-width="0.6" fill="none" opacity="0.2"/>
  </g>
</svg>