<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="eggGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="45%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="eggShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rice base -->
  <ellipse cx="32" cy="43" rx="20" ry="10" fill="#FFFFF0" filter="url(#glow)"/>
  <!-- Egg omelette (rectangular with round corners) -->
  <rect x="12" y="20" width="40" height="22" rx="8" fill="url(#eggGrad)"/>
  <!-- Layered egg texture -->
  <rect x="12" y="25" width="40" height="3" rx="1.5" fill="#FFF176" opacity="0.5"/>
  <rect x="12" y="30" width="40" height="3" rx="1.5" fill="#FFF176" opacity="0.4"/>
  <rect x="12" y="35" width="40" height="3" rx="1.5" fill="#F9A825" opacity="0.4"/>
  <!-- Shine highlight -->
  <rect x="12" y="20" width="40" height="9" rx="8" fill="url(#eggShine)"/>
  <!-- Small stars decoration -->
  <circle cx="24" cy="31" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="40" cy="27" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <!-- Nori wrap -->
  <rect x="12" y="38" width="40" height="5" rx="2.5" fill="#1B5E20" opacity="0.85"/>
</svg>