<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shrimpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="50%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="shrimpGlow" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#FFD180" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rice base (oblong) -->
  <ellipse cx="32" cy="43" rx="19" ry="10" fill="#FFF8F0" filter="url(#glow)"/>
  <!-- Shrimp body (C-shape using arc path) -->
  <path d="M22 18 Q18 26 20 34 Q22 40 30 42 Q38 42 42 38 Q46 32 44 24 Q42 16 34 14 Q28 12 24 15 Z" 
        fill="url(#shrimpGrad)" stroke="#E65100" stroke-width="0.5"/>
  <!-- Shrimp segments -->
  <path d="M22 22 Q30 19 38 22" fill="none" stroke="#FFCC80" stroke-width="1.5" opacity="0.7"/>
  <path d="M21 27 Q30 24 40 27" fill="none" stroke="#FFCC80" stroke-width="1.5" opacity="0.7"/>
  <path d="M21 32 Q30 29 40 32" fill="none" stroke="#FFCC80" stroke-width="1.2" opacity="0.6"/>
  <!-- Tail fan -->
  <path d="M42 22 L46 16 M42 22 L48 20 M42 22 L47 24" stroke="#FF6D00" stroke-width="2" stroke-linecap="round"/>
  <!-- Glow overlay -->
  <ellipse cx="32" cy="28" rx="16" ry="12" fill="url(#shrimpGlow)"/>
  <!-- Gloss -->
  <ellipse cx="27" cy="18" rx="5" ry="2.5" fill="#FFFFFF" opacity="0.35"/>
  <!-- Nori strip -->
  <rect x="14" y="41" width="36" height="4" rx="2" fill="#1B5E20" opacity="0.8"/>
</svg>