<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="salmonFish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF80AB"/>
      <stop offset="50%" stop-color="#FF4081"/>
      <stop offset="100%" stop-color="#C51162"/>
    </linearGradient>
    <linearGradient id="riceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0E0D0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rice base (white oblong) -->
  <ellipse cx="32" cy="40" rx="20" ry="11" fill="url(#riceGrad)" filter="url(#glow)"/>
  <!-- Pink fish topping (diagonal slice) -->
  <rect x="14" y="22" width="36" height="18" rx="6" fill="url(#salmonFish)"/>
  <!-- Fish texture lines -->
  <line x1="18" y1="27" x2="46" y2="27" stroke="#FF80AB" stroke-width="1.2" opacity="0.6"/>
  <line x1="18" y1="31" x2="46" y2="31" stroke="#FF80AB" stroke-width="1.2" opacity="0.5"/>
  <line x1="18" y1="35" x2="46" y2="35" stroke="#FF80AB" stroke-width="1" opacity="0.4"/>
  <!-- White fat marbling -->
  <ellipse cx="26" cy="29" rx="4" ry="2" fill="#FFFFFF" opacity="0.45"/>
  <ellipse cx="38" cy="33" rx="3" ry="1.5" fill="#FFFFFF" opacity="0.35"/>
  <!-- Gloss highlight -->
  <ellipse cx="26" cy="24" rx="8" ry="3" fill="#FFFFFF" opacity="0.4"/>
  <!-- Nori band (dark green strip) -->
  <rect x="14" y="38" width="36" height="4" rx="2" fill="#1B5E20" opacity="0.8"/>
</svg>