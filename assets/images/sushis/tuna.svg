<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tunaFish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5E92F3"/>
      <stop offset="40%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="riceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8F0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rice base -->
  <ellipse cx="32" cy="40" rx="20" ry="11" fill="url(#riceGrad)" filter="url(#glow)"/>
  <!-- Blue tuna topping (wider, darker) -->
  <rect x="13" y="21" width="38" height="19" rx="6" fill="url(#tunaFish)"/>
  <!-- Deep blue marbling veins -->
  <path d="M16 27 Q24 24 32 28 Q40 31 48 27" fill="none" stroke="#90CAF9" stroke-width="1.5" opacity="0.5"/>
  <path d="M16 33 Q24 30 32 34 Q40 37 48 33" fill="none" stroke="#90CAF9" stroke-width="1" opacity="0.4"/>
  <!-- Ocean blue sheen -->
  <ellipse cx="28" cy="24" rx="9" ry="3.5" fill="#BBDEFB" opacity="0.35"/>
  <!-- Nori strip -->
  <rect x="13" y="37" width="38" height="5" rx="2.5" fill="#1B5E20" opacity="0.85"/>
  <!-- Sesame seeds -->
  <ellipse cx="20" cy="39.5" rx="1.5" ry="1" fill="#FFFDE7"/>
  <ellipse cx="32" cy="39.5" rx="1.5" ry="1" fill="#FFFDE7"/>
  <ellipse cx="44" cy="39.5" rx="1.5" ry="1" fill="#FFFDE7"/>
</svg>